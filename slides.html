document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n>Walkthrough · 2026<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"max-width:1320px; position:relative; z-index:1;\">\n      <div style=\"font-family:'Space Mono',monospace; font-size:24px; letter-spacing:0.22em; text-transform:uppercase; color:#E4552B; margin-bottom:44px;\">Senior Full-Stack Challenge<\u002Fdiv>\n      <h1 style=\"font-size:132px; font-weight:700; line-height:0.96; letter-spacing:-0.03em; text-wrap:balance;\">Notes, built by a system<span style=\"color:#E4552B;\">.<\u002Fspan><\u002Fh1>\n      <p style=\"font-size:36px; line-height:1.42; color:rgba(243,239,230,0.62); max-width:960px; margin-top:44px;\">A spec-driven notes app for Turbo AI — and the setup that made the AI build it well.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end; font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(243,239,230,0.55); border-top:1px solid rgba(243,239,230,0.2); padding-top:30px; position:relative; z-index:1;\">\n      <span>Presented by — Xavier Ramirez<\u002Fspan>\n      <span>5-Min Walkthrough<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 02 · AGENDA (cream) ============ -->\n  <section data-label=\"Agenda\" data-speaker-notes=\"Roadmap the five minutes. The app first, then the process, architecture, AI, and time management.\" style=\"background:#F3EFE6; color:#17160F; font-family:'Space Grotesk',sans-serif; display:flex; flex-direction:column; justify-content:center; padding:110px 130px; gap:56px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:baseline;\">\n      <h2 style=\"font-size:78px; font-weight:700; letter-spacing:-0.02em;\">Walkthrough<\u002Fh2>\n      <span style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(23,22,15,0.55);\">05 Sections<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; flex-direction:column;\">\n      <div style=\"display:flex; align-items:center; gap:48px; padding:32px 0; border-top:1px solid rgba(23,22,15,0.18);\">\n        <span style=\"font-family:'Space Mono',monospace; font-size:30px; color:#E4552B;\">01<\u002Fspan>\n        <span style=\"font-size:46px; font-weight:500;\">The app<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:48px; padding:32px 0; border-top:1px solid rgba(23,22,15,0.18);\">\n        <span style=\"font-family:'Space Mono',monospace; font-size:30px; color:#E4552B;\">02<\u002Fspan>\n        <span style=\"font-size:46px; font-weight:500;\">The process<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:48px; padding:32px 0; border-top:1px solid rgba(23,22,15,0.18);\">\n        <span style=\"font-family:'Space Mono',monospace; font-size:30px; color:#E4552B;\">03<\u002Fspan>\n        <span style=\"font-size:46px; font-weight:500;\">Architecture &amp; code quality<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:48px; padding:32px 0; border-top:1px solid rgba(23,22,15,0.18);\">\n        <span style=\"font-family:'Space Mono',monospace; font-size:30px; color:#E4552B;\">04<\u002Fspan>\n        <span style=\"font-size:46px; font-weight:500;\">How I used AI<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:48px; padding:32px 0; border-top:1px solid rgba(23,22,15,0.18); border-bottom:1px solid rgba(23,22,15,0.18);\">\n        <span style=\"font-family:'Space Mono',monospace; font-size:30px; color:#E4552B;\">05<\u002Fspan>\n        <span style=\"font-size:46px; font-weight:500;\">Time management &amp; what's next<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 03 · SECTION DIVIDER — FUNCTIONALITY (dark) ============ -->\n  <section data-label=\"Divider · Functionality\" data-speaker-notes=\"Transition into functionality. Everything the brief asked for is here.\" style=\"background:#17160F; color:#F3EFE6; font-family:'Space Grotesk',sans-serif; display:flex; flex-direction:column; justify-content:space-between; padding:110px 130px 96px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.18em; text-transform:uppercase; color:rgba(243,239,230,0.6);\">\n      <span>Section 01<\u002Fspan>\n      <span>The Notes App<\u002Fspan>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-family:'Space Mono',monospace; font-size:24px; letter-spacing:0.22em; text-transform:uppercase; color:#E4552B; margin-bottom:36px;\">Functionality<\u002Fdiv>\n      <h2 style=\"font-size:130px; font-weight:700; line-height:0.94; letter-spacing:-0.03em;\">Everything the brief asked for<span style=\"color:#E4552B;\">.<\u002Fspan><\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(243,239,230,0.6); border-top:1px solid rgba(243,239,230,0.2); padding-top:30px;\">Auth · Notes · Board<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 04 · THE APP (cream) ============ -->\n  <section data-label=\"The App\" data-speaker-notes=\"Walk the feature set end to end. Private per-user notes, instant creation, autosave, category colours, board filtering, delete.\" style=\"background:#F3EFE6; color:#17160F; font-family:'Space Grotesk',sans-serif; display:flex; flex-direction:column; padding:88px 130px 84px; gap:48px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end;\">\n      <div>\n        <div style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.2em; text-transform:uppercase; color:#E4552B; margin-bottom:22px;\">The App<\u002Fdiv>\n        <h2 style=\"font-size:64px; font-weight:700; letter-spacing:-0.02em;\">The notes app, end to end.<\u002Fh2>\n      <\u002Fdiv>\n      <span style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(23,22,15,0.5);\">04<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px 80px; flex:1;\">\n      <div style=\"display:flex; gap:26px; padding:26px 0; border-top:1px solid rgba(23,22,15,0.16);\">\n        <span style=\"font-family:'Space Mono',monospace; font-size:22px; color:#E4552B; padding-top:6px;\">01<\u002Fspan>\n        <div><div style=\"font-size:30px; font-weight:600;\">Auth<\u002Fdiv><div style=\"font-size:25px; line-height:1.4; color:rgba(23,22,15,0.62); margin-top:6px;\">Signup / login; each user's notes are private. Three categories seeded on signup.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:26px; padding:26px 0; border-top:1px solid rgba(23,22,15,0.16);\">\n        <span style=\"font-family:'Space Mono',monospace; font-size:22px; color:#E4552B; padding-top:6px;\">02<\u002Fspan>\n        <div><div style=\"font-size:30px; font-weight:600;\">Instant notes<\u002Fdiv><div style=\"font-size:25px; line-height:1.4; color:rgba(23,22,15,0.62); margin-top:6px;\">Created on the first keystroke — no save button; an untouched draft creates nothing.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:26px; padding:26px 0; border-top:1px solid rgba(23,22,15,0.16);\">\n        <span style=\"font-family:'Space Mono',monospace; font-size:22px; color:#E4552B; padding-top:6px;\">03<\u002Fspan>\n        <div><div style=\"font-size:30px; font-weight:600;\">Autosave<\u002Fdiv><div style=\"font-size:25px; line-height:1.4; color:rgba(23,22,15,0.62); margin-top:6px;\">A live \"last edited\" timestamp updates as you type.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:26px; padding:26px 0; border-top:1px solid rgba(23,22,15,0.16);\">\n        <span style=\"font-family:'Space Mono',monospace; font-size:22px; color:#E4552B; padding-top:6px;\">04<\u002Fspan>\n        <div><div style=\"font-size:30px; font-weight:600;\">Category colours<\u002Fdiv><div style=\"font-size:25px; line-height:1.4; color:rgba(23,22,15,0.62); margin-top:6px;\">Flow into the editor and the preview cards.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:26px; padding:26px 0; border-top:1px solid rgba(23,22,15,0.16);\">\n        <span style=\"font-family:'Space Mono',monospace; font-size:22px; color:#E4552B; padding-top:6px;\">05<\u002Fspan>\n        <div><div style=\"font-size:30px; font-weight:600;\">Board<\u002Fdiv><div style=\"font-size:25px; line-height:1.4; color:rgba(23,22,15,0.62); margin-top:6px;\">Filter by category, per-category counts, relative dates (today / yesterday / month-day).<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:26px; padding:26px 0; border-top:1px solid rgba(23,22,15,0.16);\">\n        <span style=\"font-family:'Space Mono',monospace; font-size:22px; color:#E4552B; padding-top:6px;\">06<\u002Fspan>\n        <div><div style=\"font-size:30px; font-weight:600;\">Delete<\u002Fdiv><div style=\"font-size:25px; line-height:1.4; color:rgba(23,22,15,0.62); margin-top:6px;\">From a hover control on each card.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 05 · SCREENS (cream) ============ -->\n  <section data-label=\"Screens\" data-speaker-notes=\"Show the three core screens and how they connect: signup, board, editor.\" style=\"background:#F3EFE6; color:#17160F; font-family:'Space Grotesk',sans-serif; display:flex; flex-direction:column; padding:88px 130px 84px; gap:44px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end;\">\n      <div>\n        <div style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.2em; text-transform:uppercase; color:#E4552B; margin-bottom:22px;\">In the Product<\u002Fdiv>\n        <h2 style=\"font-size:64px; font-weight:700; letter-spacing:-0.02em;\">Three screens, one flow.<\u002Fh2>\n      <\u002Fdiv>\n      <span style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(23,22,15,0.5);\">05<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:32px; flex:1;\">\n      <div class=\"ph\" style=\"align-items:flex-start; flex-direction:column; justify-content:space-between;\"><span class=\"ph-tag\" style=\"align-self:flex-start;\">01 · Signup<\u002Fspan><span class=\"ph-tag\">Screenshot<\u002Fspan><\u002Fdiv>\n      <div class=\"ph\" style=\"align-items:flex-start; flex-direction:column; justify-content:space-between;\"><span class=\"ph-tag\" style=\"align-self:flex-start;\">02 · Board<\u002Fspan><span class=\"ph-tag\">Screenshot<\u002Fspan><\u002Fdiv>\n      <div class=\"ph\" style=\"align-items:flex-start; flex-direction:column; justify-content:space-between;\"><span class=\"ph-tag\" style=\"align-self:flex-start;\">03 · Editor<\u002Fspan><span class=\"ph-tag\">Screenshot<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 06 · THE APPROACH (cream) ============ -->\n  <section data-label=\"The Approach\" data-speaker-notes=\"The thesis of the whole talk. Land it slowly, then let it sit.\" style=\"background:#F3EFE6; color:#17160F; font-family:'Space Grotesk',sans-serif; display:flex; flex-direction:column; justify-content:center; padding:110px 150px; gap:52px;\">\n    <div style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.2em; text-transform:uppercase; color:#E4552B;\">The Approach<\u002Fdiv>\n    <p style=\"font-size:80px; font-weight:600; line-height:1.12; letter-spacing:-0.02em; max-width:1600px; text-wrap:pretty;\">I didn't just use AI to write the code. I built a system that makes AI write <span style=\"color:#E4552B;\">good code.<\u002Fspan><\u002Fp>\n  <\u002Fsection>\n\n  <!-- ============ 07 · THE PROCESS (cream) ============ -->\n  <section data-label=\"The Process\" data-speaker-notes=\"Three moves: set guardrails, turn the brief into specs, implement with Claude Code.\" style=\"background:#F3EFE6; color:#17160F; font-family:'Space Grotesk',sans-serif; display:flex; flex-direction:column; padding:88px 130px 84px; gap:48px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end;\">\n      <div>\n        <div style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.2em; text-transform:uppercase; color:#E4552B; margin-bottom:22px;\">The Process<\u002Fdiv>\n        <h2 style=\"font-size:64px; font-weight:700; letter-spacing:-0.02em;\">Three moves.<\u002Fh2>\n      <\u002Fdiv>\n      <span style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(23,22,15,0.5);\">07<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; flex-direction:column; flex:1;\">\n      <div style=\"display:grid; grid-template-columns:120px 1fr; gap:40px; padding:32px 0; border-top:1px solid rgba(23,22,15,0.16);\">\n        <span style=\"font-family:'Space Mono',monospace; font-size:34px; color:#E4552B;\">01<\u002Fspan>\n        <div><div style=\"font-size:34px; font-weight:600; margin-bottom:10px;\">Set the guardrails<\u002Fdiv><div style=\"font-size:26px; line-height:1.42; color:rgba(23,22,15,0.64); max-width:1360px;\">CLAUDE.md, path-scoped rules, reusable skills, guardrail hooks, CI, and architecture docs. Everything the AI needs to write clean, tested code — with the boundaries enforced by the build itself.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:120px 1fr; gap:40px; padding:32px 0; border-top:1px solid rgba(23,22,15,0.16);\">\n        <span style=\"font-family:'Space Mono',monospace; font-size:34px; color:#E4552B;\">02<\u002Fspan>\n        <div><div style=\"font-size:34px; font-weight:600; margin-bottom:10px;\">Turn the brief into specs<\u002Fdiv><div style=\"font-size:26px; line-height:1.42; color:rgba(23,22,15,0.64); max-width:1360px;\">The requirements live in a video + Figma. A small tool extracts the audio with ffmpeg and transcribes it with the OpenAI API, pulls keyframes aligned to the transcript, and authors spec-kit specs (numbered EARS acceptance criteria) per feature.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:120px 1fr; gap:40px; padding:32px 0; border-top:1px solid rgba(23,22,15,0.16); border-bottom:1px solid rgba(23,22,15,0.16);\">\n        <span style=\"font-family:'Space Mono',monospace; font-size:34px; color:#E4552B;\">03<\u002Fspan>\n        <div><div style=\"font-size:34px; font-weight:600; margin-bottom:10px;\">Implement with Claude Code<\u002Fdiv><div style=\"font-size:26px; line-height:1.42; color:rgba(23,22,15,0.64); max-width:1360px;\"><code style=\"font-family:'Space Mono',monospace; font-size:23px;\">/spec-implement<\u002Fcode> per feature, in priority order. Tests are derived from the acceptance criteria first, then the code, and every change is checked by the guardrails.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 08 · ARCHITECTURE & KEY DECISIONS (cream) ============ -->\n  <section data-label=\"Key Decisions\" data-speaker-notes=\"The design decisions. Two enforced architectures, the DB-as-log, spec-driven truth, Supabase, and concurrency handling.\" style=\"background:#F3EFE6; color:#17160F; font-family:'Space Grotesk',sans-serif; display:flex; flex-direction:column; padding:80px 130px 76px; gap:40px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end;\">\n      <div>\n        <div style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.2em; text-transform:uppercase; color:#E4552B; margin-bottom:20px;\">Key Decisions<\u002Fdiv>\n        <h2 style=\"font-size:60px; font-weight:700; letter-spacing:-0.02em;\">Two architectures, both enforced.<\u002Fh2>\n      <\u002Fdiv>\n      <span style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(23,22,15,0.5);\">08<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px 72px; flex:1;\">\n      <div style=\"padding:22px 0; border-top:1px solid rgba(23,22,15,0.16);\">\n        <div style=\"font-size:28px; font-weight:600; margin-bottom:8px;\">Hexagonal / DDD backend<\u002Fdiv>\n        <div style=\"font-size:24px; line-height:1.38; color:rgba(23,22,15,0.62);\">Each context layered interface → application → domain; the domain is framework-free; ORM and DRF are adapters behind ports. Enforced by <strong style=\"color:#17160F;\">import-linter<\u002Fstrong>.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:22px 0; border-top:1px solid rgba(23,22,15,0.16);\">\n        <div style=\"font-size:28px; font-weight:600; margin-bottom:8px;\">Feature-Sliced frontend<\u002Fdiv>\n        <div style=\"font-size:24px; line-height:1.38; color:rgba(23,22,15,0.62);\">Layers import one-way; slices talk only through a public <code style=\"font-family:'Space Mono',monospace; font-size:21px;\">index.ts<\u002Fcode>. Enforced by <strong style=\"color:#17160F;\">dependency-cruiser<\u002Fstrong>.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:22px 0; border-top:1px solid rgba(23,22,15,0.16);\">\n        <div style=\"font-size:28px; font-weight:600; margin-bottom:8px;\">The database is the operational log<\u002Fdiv>\n        <div style=\"font-size:24px; line-height:1.38; color:rgba(23,22,15,0.62);\">Every request, event, and error is a queryable row correlated by <code style=\"font-family:'Space Mono',monospace; font-size:21px;\">request_id<\u002Fcode>; secrets redacted, rows never deleted.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:22px 0; border-top:1px solid rgba(23,22,15,0.16);\">\n        <div style=\"font-size:28px; font-weight:600; margin-bottom:8px;\">Spec-driven, two sources of truth<\u002Fdiv>\n        <div style=\"font-size:24px; line-height:1.38; color:rgba(23,22,15,0.62);\">Behaviour fixed by the spec, appearance by the Figma; every acceptance criterion maps to a test that names it.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:22px 0; border-top:1px solid rgba(23,22,15,0.16);\">\n        <div style=\"font-size:28px; font-weight:600; margin-bottom:8px;\">Supabase Postgres<\u002Fdiv>\n        <div style=\"font-size:24px; line-height:1.38; color:rgba(23,22,15,0.62);\">Django connects via <code style=\"font-family:'Space Mono',monospace; font-size:21px;\">DATABASE_URL<\u002Fcode> (SQLite locally / CI); Django owns auth and all business logic.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:22px 0; border-top:1px solid rgba(23,22,15,0.16);\">\n        <div style=\"font-size:28px; font-weight:600; margin-bottom:8px;\">Concurrency &amp; offline<\u002Fdiv>\n        <div style=\"font-size:24px; line-height:1.38; color:rgba(23,22,15,0.62);\">Optimistic <code style=\"font-family:'Space Mono',monospace; font-size:21px;\">version<\u002Fcode> + advisory lock online; offline edits queue in a local outbox and reconcile on reconnect.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 09 · CODE QUALITY (cream) ============ -->\n  <section data-label=\"Code Quality\" data-speaker-notes=\"How quality is enforced so it fails the build: tests as a contract, boundaries, three gates, self-protecting config.\" style=\"background:#F3EFE6; color:#17160F; font-family:'Space Grotesk',sans-serif; display:flex; flex-direction:column; padding:88px 130px 84px; gap:48px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end;\">\n      <div>\n        <div style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.2em; text-transform:uppercase; color:#E4552B; margin-bottom:22px;\">Code Quality<\u002Fdiv>\n        <h2 style=\"font-size:64px; font-weight:700; letter-spacing:-0.02em;\">Quality that fails the build.<\u002Fh2>\n      <\u002Fdiv>\n      <span style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(23,22,15,0.5);\">09<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:24px 72px; flex:1;\">\n      <div style=\"border-top:2px solid #17160F; padding-top:24px;\">\n        <div style=\"font-size:30px; font-weight:600; margin-bottom:10px;\">Tests are a contract<\u002Fdiv>\n        <div style=\"font-size:25px; line-height:1.4; color:rgba(23,22,15,0.62);\">A pre-edit hook blocks the AI from cheating a test — no skip / xfail / .only, no deleting assertions, no suppressions, no lowering the coverage floor. Shell escapes are blocked too.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:2px solid #17160F; padding-top:24px;\">\n        <div style=\"font-size:30px; font-weight:600; margin-bottom:10px;\">Boundaries enforced<\u002Fdiv>\n        <div style=\"font-size:25px; line-height:1.4; color:rgba(23,22,15,0.62);\">import-linter (backend) and dependency-cruiser (frontend) fail the build on any architectural drift.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:2px solid #17160F; padding-top:24px;\">\n        <div style=\"font-size:30px; font-weight:600; margin-bottom:10px;\">Three escalating gates<\u002Fdiv>\n        <div style=\"font-size:25px; line-height:1.4; color:rgba(23,22,15,0.62);\">In-session hooks → pre-commit → CI (GitHub Actions), with an <strong style=\"color:#17160F;\">85% coverage floor<\u002Fstrong>.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:2px solid #17160F; padding-top:24px;\">\n        <div style=\"font-size:30px; font-weight:600; margin-bottom:10px;\">Self-protecting<\u002Fdiv>\n        <div style=\"font-size:25px; line-height:1.4; color:rgba(23,22,15,0.62);\">The enforcement config is change-protected, so the guardrails can't quietly weaken themselves.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 10 · BY THE NUMBERS (cream) ============ -->\n  <section data-label=\"By the Numbers\" data-speaker-notes=\"Three figures. Replace with your final numbers before presenting.\" style=\"background:#F3EFE6; color:#17160F; font-family:'Space Grotesk',sans-serif; display:flex; flex-direction:column; padding:110px 130px 96px; gap:72px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.16em; text-transform:uppercase; color:rgba(23,22,15,0.6); border-bottom:1px solid rgba(23,22,15,0.18); padding-bottom:26px;\">\n      <span>By the Numbers<\u002Fspan>\n      <span>10<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:70px; flex:1; align-content:center;\">\n      <div>\n        <div style=\"font-size:150px; font-weight:700; letter-spacing:-0.04em; line-height:1;\">85<span style=\"color:#E4552B;\">%<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:32px; font-weight:600; margin-top:18px;\">Coverage floor<\u002Fdiv>\n        <div style=\"font-size:26px; color:rgba(23,22,15,0.6); margin-top:8px; line-height:1.4;\">Enforced in CI &amp; pre-commit.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:150px; font-weight:700; letter-spacing:-0.04em; line-height:1;\">4<\u002Fdiv>\n        <div style=\"font-size:32px; font-weight:600; margin-top:18px;\">Spec-kit specs<\u002Fdiv>\n        <div style=\"font-size:26px; color:rgba(23,22,15,0.6); margin-top:8px; line-height:1.4;\">Auth · notes · board · collaboration.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:150px; font-weight:700; letter-spacing:-0.04em; line-height:1;\">3<\u002Fdiv>\n        <div style=\"font-size:32px; font-weight:600; margin-top:18px;\">Escalating gates<\u002Fdiv>\n        <div style=\"font-size:26px; color:rgba(23,22,15,0.6); margin-top:8px; line-height:1.4;\">Hooks → pre-commit → CI.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-family:'Space Mono',monospace; font-size:20px; letter-spacing:0.08em; text-transform:uppercase; color:rgba(23,22,15,0.42);\">Replace with your final figures before presenting<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 11 · HOW I USED AI (dark) ============ -->\n  <section data-label=\"How I Used AI\" data-speaker-notes=\"AI across the whole build — not just codegen. Claude designed the setup and wrote specs; OpenAI + ffmpeg turned the video into requirements; Claude Code implemented; Figma MCP pulled tokens.\" style=\"background:#17160F; color:#F3EFE6; font-family:'Space Grotesk',sans-serif; display:flex; flex-direction:column; padding:88px 130px 84px; gap:44px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end;\">\n      <div>\n        <div style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.2em; text-transform:uppercase; color:#E4552B; margin-bottom:22px;\">How I Used AI<\u002Fdiv>\n        <h2 style=\"font-size:64px; font-weight:700; letter-spacing:-0.02em;\">AI across the whole build.<\u002Fh2>\n      <\u002Fdiv>\n      <span style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(243,239,230,0.5);\">11<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:0 80px; flex:1;\">\n      <div style=\"display:flex; flex-direction:column;\">\n        <div style=\"display:flex; gap:26px; padding:19px 0; border-top:1px solid rgba(243,239,230,0.18);\"><span style=\"font-family:'Space Mono',monospace; font-size:22px; color:#E4552B; padding-top:6px;\">01<\u002Fspan><div><div style=\"font-size:27px; font-weight:600;\">Claude (Cowork)<\u002Fdiv><div style=\"font-size:23px; line-height:1.36; color:rgba(243,239,230,0.6); margin-top:5px;\">Designed the setup — rules, skills, hooks, CI, architecture docs — and wrote the specs.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; gap:26px; padding:19px 0; border-top:1px solid rgba(243,239,230,0.18);\"><span style=\"font-family:'Space Mono',monospace; font-size:22px; color:#E4552B; padding-top:6px;\">02<\u002Fspan><div><div style=\"font-size:27px; font-weight:600;\">OpenAI Speech-to-Text<\u002Fdiv><div style=\"font-size:23px; line-height:1.36; color:rgba(243,239,230,0.6); margin-top:5px;\">Transcribed the brief's walkthrough video into the source of requirements.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; gap:26px; padding:19px 0; border-top:1px solid rgba(243,239,230,0.18);\"><span style=\"font-family:'Space Mono',monospace; font-size:22px; color:#E4552B; padding-top:6px;\">03<\u002Fspan><div><div style=\"font-size:27px; font-weight:600;\">ffmpeg<\u002Fdiv><div style=\"font-size:23px; line-height:1.36; color:rgba(243,239,230,0.6); margin-top:5px;\">Extracted the audio and pulled keyframes aligned to the transcript.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; gap:26px; padding:19px 0; border-top:1px solid rgba(243,239,230,0.18);\"><span style=\"font-family:'Space Mono',monospace; font-size:22px; color:#E4552B; padding-top:6px;\">04<\u002Fspan><div><div style=\"font-size:27px; font-weight:600;\">Claude Code<\u002Fdiv><div style=\"font-size:23px; line-height:1.36; color:rgba(243,239,230,0.6); margin-top:5px;\">Implemented the app feature by feature via a custom <code style=\"font-family:'Space Mono',monospace; font-size:20px;\">/spec-implement<\u002Fcode> skill, fully gated.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column;\">\n        <div style=\"display:flex; gap:26px; padding:19px 0; border-top:1px solid rgba(243,239,230,0.18);\"><span style=\"font-family:'Space Mono',monospace; font-size:22px; color:#E4552B; padding-top:6px;\">05<\u002Fspan><div><div style=\"font-size:27px; font-weight:600;\">Figma plugin (Figma MCP)<\u002Fdiv><div style=\"font-size:23px; line-height:1.36; color:rgba(243,239,230,0.6); margin-top:5px;\">Pulled exact design tokens and frames so the UI matched the design.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; gap:26px; padding:19px 0; border-top:1px solid rgba(243,239,230,0.18);\"><span style=\"font-family:'Space Mono',monospace; font-size:22px; color:#E4552B; padding-top:6px;\">06<\u002Fspan><div><div style=\"font-size:27px; font-weight:600;\">Claude (design)<\u002Fdiv><div style=\"font-size:23px; line-height:1.36; color:rgba(243,239,230,0.6); margin-top:5px;\">Designed this presentation.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; gap:26px; padding:19px 0; border-top:1px solid rgba(243,239,230,0.18);\"><span style=\"font-family:'Space Mono',monospace; font-size:22px; color:#E4552B; padding-top:6px;\">07<\u002Fspan><div><div style=\"font-size:27px; font-weight:600;\">ngrok<\u002Fdiv><div style=\"font-size:23px; line-height:1.36; color:rgba(243,239,230,0.6); margin-top:5px;\">Published the live demo.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"margin-top:auto; padding:22px 0 0; border-top:2px solid #E4552B;\"><div style=\"font-size:25px; line-height:1.38; font-weight:500;\">AI didn't just write code — it helped build the system that keeps the code good.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 12 · TIME MANAGEMENT (cream) ============ -->\n  <section data-label=\"Time Management\" data-speaker-notes=\"Built in tiers so it was always shippable. MVP first, then additive tiers. Front-loading guardrails paid off.\" style=\"background:#F3EFE6; color:#17160F; font-family:'Space Grotesk',sans-serif; display:flex; flex-direction:column; padding:88px 130px 84px; gap:48px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end;\">\n      <div>\n        <div style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.2em; text-transform:uppercase; color:#E4552B; margin-bottom:22px;\">Time Management<\u002Fdiv>\n        <h2 style=\"font-size:64px; font-weight:700; letter-spacing:-0.02em;\">Built in tiers, always shippable.<\u002Fh2>\n      <\u002Fdiv>\n      <span style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(23,22,15,0.5);\">12<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:48px; flex:1;\">\n      <div style=\"background:#17160F; color:#F3EFE6; padding:48px; display:flex; flex-direction:column; gap:20px;\">\n        <div style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.14em; text-transform:uppercase; color:#E4552B;\">Tier 1 · MVP<\u002Fdiv>\n        <div style=\"font-size:34px; font-weight:600; line-height:1.2;\">Auth · notes · board<\u002Fdiv>\n        <div style=\"font-size:26px; line-height:1.4; color:rgba(243,239,230,0.66);\">The complete app the video demonstrates. Shipped first.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:rgba(23,22,15,0.05); border:1px solid rgba(23,22,15,0.16); padding:48px; display:flex; flex-direction:column; gap:20px;\">\n        <div style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(23,22,15,0.55);\">Tier 2 &amp; 3 · Additive<\u002Fdiv>\n        <div style=\"font-size:34px; font-weight:600; line-height:1.2;\">Offline sync · real-time locking<\u002Fdiv>\n        <div style=\"font-size:26px; line-height:1.4; color:rgba(23,22,15,0.66);\">Layered on without touching the core.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:2px solid #E4552B; padding-top:26px; font-size:28px; line-height:1.4; font-weight:500; max-width:1500px;\">Front-loading the guardrails paid for itself — every later change stayed clean and tested without slowing down.<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 13 · OLD WAY VS THIS SETUP (cream) ============ -->\n  <section data-label=\"Before / After\" data-speaker-notes=\"The contrast that sums it up. Old way: prompt, paste, hope. This setup: spec-first, tested, enforced.\" style=\"background:#F3EFE6; color:#17160F; font-family:'Space Grotesk',sans-serif; display:flex; flex-direction:column; padding:110px 130px 96px; gap:56px;\">\n    <h2 style=\"font-size:68px; font-weight:700; letter-spacing:-0.02em;\">The old way vs. this setup.<\u002Fh2>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:48px; flex:1;\">\n      <div style=\"background:rgba(23,22,15,0.05); border:1px solid rgba(23,22,15,0.16); padding:56px; display:flex; flex-direction:column; gap:30px;\">\n        <div style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.16em; text-transform:uppercase; color:rgba(23,22,15,0.55);\">Before<\u002Fdiv>\n        <div style=\"font-size:36px; line-height:1.32; color:rgba(23,22,15,0.7);\">Prompt, paste, hope. Untested code, silent drift, no boundaries — and no way to tell when it broke.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#17160F; color:#F3EFE6; padding:56px; display:flex; flex-direction:column; gap:30px;\">\n        <div style=\"font-family:'Space Mono',monospace; font-size:22px; letter-spacing:0.16em; text-transform:uppercase; color:#E4552B;\">With this setup<\u002Fdiv>\n        <div style=\"font-size:36px; line-height:1.32;\">Spec-first. Tests from the criteria. Boundaries the build enforces. Move fast without breaking things.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 14 · CLOSE (dark) ============ -->\n  <section data-label=\"Close\" data-speaker-notes=\"Close. Thank them, restate the one line, and point to the repo an
